name: databuddy

services:
  web:
    build: .
    container_name: databuddy_web
    restart: always
    environment:
      - OLLAMA_URL=http://ollama:11434/api/chat
    env_file:
      - .env
    volumes:
      - .:/app
      - app_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  ollama:
    image: ollama/ollama:latest
    container_name: databuddy_ollama
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 4G

  caddy:
    image: caddy:2-alpine
    container_name: databuddy_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  ollama_data:
  caddy_data:
  caddy_config:
  app_data:
